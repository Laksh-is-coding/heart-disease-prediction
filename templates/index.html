<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Predictor</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
        }

        .subtitle {
            color: gray;
            font-size: 14px;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            transition: 0.2s;
        }

        input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        button {
            width: 95%;
            padding: 12px;
            margin-top: 15px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #f5f5f5;
            animation: fadeIn 0.5s ease;
        }

        .high-risk {
            color: red;
            font-weight: bold;
        }

        .low-risk {
            color: green;
            font-weight: bold;
        }

        .progress-bar {
            height: 10px;
            border-radius: 5px;
            background: #ddd;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, red, orange, green);
            width: 0%;
            transition: width 1s ease;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>💓 Heart Disease Predictor</h1>
    <p class="subtitle">Enter patient details to assess risk</p>

    <form action="/predict_form" method="post">

        <input type="number" name="age" placeholder="Age" required>
        <input type="number" name="sex" placeholder="Sex (1=Male, 0=Female)" required>
        <input type="number" name="cp" placeholder="Chest Pain Type (0-3)" required>
        <input type="number" name="trestbps" placeholder="Resting BP" required>
        <input type="number" name="chol" placeholder="Cholesterol" required>
        <input type="number" name="fbs" placeholder="Fasting Sugar (1/0)" required>
        <input type="number" name="restecg" placeholder="ECG (0-2)" required>
        <input type="number" name="thalach" placeholder="Max Heart Rate" required>
        <input type="number" name="exang" placeholder="Exercise Angina (1/0)" required>
        <input type="number" step="any" name="oldpeak" placeholder="Oldpeak" required>

        <button type="submit">🔍 Predict</button>

    </form>

    {% if prediction_text %}
    <div class="result">
        <p class="{{ 'high-risk' if 'Disease' in prediction_text else 'low-risk' }}">
            {{ prediction_text }}
        </p>

        {% if probability_text %}
            <p>{{ probability_text }}</p>

            <div class="progress-bar">
                <div class="progress-fill"
                     style="width: {{ probability_text.split(': ')[1].replace('%','') if probability_text else 0 }}%;">
                </div>
            </div>
        {% endif %}
    </div>
    {% endif %}

    <div class="footer">
        🚀 ML Project • Flask • Scikit-learn
    </div>
</div>

</body>
</html>
